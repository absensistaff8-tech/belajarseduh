<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Executive Backoffice | Eggy Nugraha</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen">

  <!-- NAVBAR -->
  <nav class="border-b border-slate-800 bg-slate-900/50 p-4 sticky top-0 backdrop-blur-md z-50">
    <div class="max-w-5xl mx-auto flex justify-between items-center">
      <h1 class="text-xl font-black tracking-tighter text-white">BACKOFFICE <span class="text-amber-500 italic">V1</span></h1>
      <div id="statusBadge" class="text-[9px] font-bold px-2 py-1 rounded bg-emerald-900/30 text-emerald-500 border border-emerald-900">SYSTEM ONLINE</div>
    </div>
  </nav>

  <main class="max-w-5xl mx-auto p-4 md:p-6 space-y-6">
    
    <!-- KPI SUMMARY -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
      <div class="bg-slate-900 p-4 rounded-xl border border-slate-800">
        <p class="text-[10px] uppercase text-slate-500 font-bold">Total Menu</p>
        <p id="kpiTotal" class="text-2xl font-black text-white">0</p>
      </div>
      <div class="bg-slate-900 p-4 rounded-xl border border-slate-800">
        <p class="text-[10px] uppercase text-slate-500 font-bold">Menu Bocor</p>
        <p id="kpiBocor" class="text-2xl font-black text-red-500">0</p>
      </div>
      <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 col-span-2">
        <p class="text-[10px] uppercase text-slate-500 font-bold">Performa Profitability</p>
        <div class="w-full bg-slate-800 h-2 mt-2 rounded-full overflow-hidden">
          <div id="kpiBar" class="bg-amber-500 h-full w-0 transition-all"></div>
        </div>
      </div>
    </div>

    <!-- TABEL UTAMA -->
    <div class="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden">
      <table class="w-full text-left text-xs">
        <thead class="bg-slate-950 text-slate-400 uppercase">
          <tr>
            <th class="p-4">Menu</th>
            <th class="p-4 text-right">Harga</th>
            <th class="p-4 text-right">HPP</th>
            <th class="p-4 text-center">Status</th>
          </tr>
        </thead>
        <tbody id="cogsTableBody" class="divide-y divide-slate-800">
          <!-- Data diisi JS -->
        </tbody>
      </table>
    </div>
  </main>

  <script>
    async function loadDashboard() {
      const res = await fetch('/api/cogs');
      const json = await res.json();
      const data = json.data;

      document.getElementById('kpiTotal').innerText = data.length;
      const bocor = data.filter(m => m.status === "BOCOR").length;
      document.getElementById('kpiBocor').innerText = bocor;
      document.getElementById('kpiBar').style.width = ((data.length - bocor) / data.length * 100) + "%";

      let rows = "";
      data.forEach(m => {
        rows += `
          <tr class="hover:bg-slate-800/50 transition">
            <td class="p-4 font-bold text-white">${m.nama_menu}</td>
            <td class="p-4 text-right">${m.harga_jual.toLocaleString()}</td>
            <td class="p-4 text-right font-mono">${m.cogs_aktual_persen}%</td>
            <td class="p-4 text-center">
              <span class="${m.status === 'SEHAT' ? 'text-emerald-500' : 'text-red-500'} font-bold uppercase text-[10px]">
                ${m.status}
              </span>
            </td>
          </tr>
        `;
      });
      document.getElementById('cogsTableBody').innerHTML = rows;
    }
    loadDashboard();
  </script>
</body>
</html>
