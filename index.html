<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F&B Supabase Training Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-900 text-slate-100 font-sans min-h-screen p-4 flex flex-col items-center justify-start">

    <input type="hidden" id="sessionPin">
    <input type="hidden" id="sessionNama">
    <input type="hidden" id="sessionPeran">
    <input type="hidden" id="sessionModulId">

    <div id="loginView" class="w-full max-w-sm bg-slate-800 rounded-2xl shadow-2xl p-6 mt-16 border border-slate-700">
      <h2 class="text-2xl font-black text-center text-white tracking-tight uppercase">F&B SUPABASE ENGINE</h2>
      <p class="text-xs text-amber-400 text-center mt-1 uppercase tracking-wider font-bold">Portal Kompetensi Otomatis</p>
      
      <form id="formLogin" onsubmit="executeLogin(event)" class="mt-6">
        <label class="block text-xs font-bold uppercase text-slate-400 mb-2 text-center">Input PIN Otorisasi</label>
        <input type="password" id="pinInput" class="w-full bg-slate-900 border-2 border-slate-700 rounded-xl p-3 text-center text-3xl tracking-widest font-black text-white focus:outline-none focus:border-amber-500 mb-4 transition" placeholder="••••" maxlength="4" required inputmode="numeric">
        <button type="submit" id="btnLogin" class="w-full bg-amber-500 hover:bg-amber-600 text-slate-900 font-black py-3.5 px-4 rounded-xl transition tracking-wide uppercase text-sm shadow-lg">Validasi Peran</button>
      </form>
      <div id="notifLogin" class="mt-4 font-bold text-center hidden p-3 rounded-xl text-xs uppercase tracking-wide"></div>
    </div>

    <div id="dashboardView" class="w-full max-w-md bg-slate-800 rounded-2xl shadow-2xl p-5 border border-slate-700 hidden mt-4">
      <div class="flex justify-between items-center border-b border-slate-700 pb-4 mb-4">
        <div>
          <h2 id="dashNamaDisplay" class="text-base font-black text-white">NAMA USER</h2>
          <span id="dashPeranBadge" class="text-[10px] bg-amber-500/20 text-amber-400 border border-amber-500/30 font-bold px-2.5 py-0.5 rounded-full uppercase tracking-wider mt-1 inline-block">PERAN</span>
        </div>
        <button onclick="executeLogout()" class="text-xs bg-red-600/20 text-red-400 border border-red-500/30 font-bold px-3 py-1.5 rounded-xl hover:bg-red-600 hover:text-white transition uppercase">Logout</button>
      </div>

      <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Daftar Modul Pelatihan Anda:</h3>
      <div id="listModulKontainer" class="space-y-3"></div>
    </div>

    <div id="materiView" class="w-full max-w-md bg-slate-800 rounded-2xl shadow-2xl overflow-hidden border border-slate-700 hidden mt-4 mb-8">
      <div class="bg-slate-950 p-4 flex justify-between items-center border-b border-slate-800">
        <div>
          <h2 id="judulModulDisplay" class="text-sm font-black text-white uppercase tracking-wide">Nama Modul</h2>
          <p id="materiPeranDisplay" class="text-[10px] text-slate-400 uppercase font-bold mt-0.5">Target: -</p>
        </div>
        <button onclick="kembaliKeDashboard()" class="text-xs bg-slate-700 hover:bg-slate-600 text-white font-bold px-3 py-1.5 rounded-lg transition uppercase tracking-wider">Kembali</button>
      </div>

      <div class="aspect-video bg-black">
        <iframe id="videoPlayer" class="w-full h-full" src="" frameborder="0" allowfullscreen></iframe>
      </div>

      <div class="p-4 bg-slate-900/50">
        <div class="bg-amber-500/10 border-l-4 border-amber-500 text-amber-300 p-3 rounded-r-lg mb-4 text-xs">
          <p class="font-bold uppercase tracking-wide mb-0.5">SOP PENTING:</p>
          <p id="teksSopDisplay" class="italic text-slate-300">Detail instruksi...</p>
        </div>

        <form id="formKuis" onsubmit="executeKuisSubmit(event)">
          <div id="dynamicKuisArea" class="space-y-4"></div>
          <button type="submit" id="btnKuis" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3.5 rounded-xl transition text-sm uppercase tracking-wider mt-5 hidden shadow-md">Kirim Evaluasi Kompetensi</button>
        </form>
        <div id="notifKuis" class="mt-4 font-bold text-center hidden p-4 rounded-xl text-xs border"></div>
      </div>
    </div>

    <script>
      // KUNCI SUPABASE DI SINI SUDAH DIHAPUS TOTAL. AMAN DARI INSPECT ELEMENT.
      var globalStorageModul = [];
      var activeModul = null;

      // 1. OTORISASI PIN MENEMBAK BACKEND INTERNAL VERCEL
      function executeLogin(event) {
        event.preventDefault();
        var pin = document.getElementById('pinInput').value;
        var btn = document.getElementById('btnLogin');
        var notif = document.getElementById('notifLogin');
        
        btn.disabled = true;
        btn.innerText = "MENGOTORISASI...";
        
        fetch('/api/login', {
          method: 'POST',
          body: JSON.stringify({ pin: pin })
        })
        .then(res => res.json())
        .then(respon => {
          if(respon.status) {
            notif.classList.add('hidden');
            document.getElementById('loginView').classList.add('hidden');
            document.getElementById('dashboardView').classList.remove('hidden');
            
            document.getElementById('sessionPin').value = pin;
            document.getElementById('sessionNama').value = respon.nama;
            document.getElementById('sessionPeran').value = respon.peran;
            
            document.getElementById('dashNamaDisplay').innerText = respon.nama.toUpperCase();
            document.getElementById('dashPeranBadge').innerText = respon.peran;
            
            pullMateriInternal(respon.peran);
          } else {
            throw new Error(respon.pesan);
          }
        })
        .catch(err => {
          notif.innerText = err.message || "KONEKSI SERVER PUTUS.";
          notif.className = "mt-4 font-bold text-center p-3 bg-red-900/40 text-red-400 border border-red-500/30 rounded-xl text-xs uppercase tracking-wide";
          notif.classList.remove('hidden');
          btn.disabled = false;
          btn.innerText = "VALIDASI PERAN";
        });
      }

     // 2. TARIK MATERI BERDASARKAN PERAN & PIN VIA PROXY INTERNAL
      function pullMateriInternal(peran) {
        var kontainer = document.getElementById('listModulKontainer');
        var pinStaf = document.getElementById('sessionPin').value; // Ambil PIN untuk cek progres
        kontainer.innerHTML = "<p class='text-xs text-slate-400 animate-pulse text-center py-4'>Menyinkronkan materi peran & progres...</p>";

        fetch('/api/materi', {
          method: 'POST',
          body: JSON.stringify({ peran: peran, pin: pinStaf })
        })
        .then(res => res.json())
        .then(respon => {
          if(respon.status && respon.data) {
            globalStorageModul = respon.data;
            renderDashboardList(respon.data, respon.passed); // Kirim data lulus ke render
          }
        });
      }

      // 3. RENDER DASHBOARD DENGAN LOGIKA PENGUNCI KAKU
      function renderDashboardList(dataModul, passedIds) {
        var kontainer = document.getElementById('listModulKontainer');
        if(dataModul.length === 0) {
          kontainer.innerHTML = "<p class='text-xs text-slate-500 italic text-center py-4'>Tidak ada modul khusus untuk peran Anda saat ini.</p>";
          return;
        }
        
        var html = "";
        dataModul.forEach((modul, indeks) => {
          // LOGIKA HIERARKI: Modul pertama (0) otomatis terbuka.
          // Modul berikutnya hanya terbuka JIKA modul sebelumnya sudah ada di passedIds.
          var isUnlocked = false;
          if (indeks === 0) {
            isUnlocked = true; 
          } else {
            var prevModulId = dataModul[indeks - 1].id.toString().trim();
            if (passedIds.includes(prevModulId)) {
              isUnlocked = true;
            }
          }

          if (isUnlocked) {
            // RENDER KARTU TERBUKA (BISA DIKLIK)
            html += `
              <div onclick="bukaRuangBelajar(${indeks})" class="bg-slate-900 p-4 border border-slate-700/50 rounded-xl hover:border-amber-500 transition cursor-pointer flex justify-between items-center group shadow-md">
                <div>
                  <span class="text-[10px] font-bold text-amber-400 tracking-widest uppercase block mb-0.5">MODUL ${modul.id}</span>
                  <span class="text-sm font-bold text-white group-hover:text-amber-400 transition">${modul.judul}</span>
                </div>
                <span class="text-xs bg-slate-800 text-slate-300 font-bold px-3 py-1.5 rounded-lg group-hover:bg-amber-500 group-hover:text-slate-900 transition uppercase">Mulai</span>
              </div>
            `;
          } else {
            // RENDER KARTU TERKUNCI MATI (TIDAK ADA FUNGSI ONCLICK, WARNA ABU-ABU)
            html += `
              <div class="bg-slate-950 p-4 border border-slate-800 rounded-xl flex justify-between items-center opacity-60 grayscale cursor-not-allowed shadow-inner">
                <div>
                  <span class="text-[10px] font-bold text-slate-500 tracking-widest uppercase block mb-0.5">MODUL ${modul.id} (TERKUNCI)</span>
                  <span class="text-sm font-bold text-slate-400">${modul.judul}</span>
                </div>
                <span class="text-[10px] bg-slate-900 text-slate-600 border border-slate-700 font-bold px-2 py-1 rounded-lg uppercase flex items-center">
                  <svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                  Gembok
                </span>
              </div>
            `;
          }
        });
        kontainer.innerHTML = html;
      }
      

      function bukaRuangBelajar(indeks) {
        activeModul = globalStorageModul[indeks]; 
        var peran = document.getElementById('sessionPeran').value;

        document.getElementById('dashboardView').classList.add('hidden');
        document.getElementById('materiView').classList.remove('hidden');

        document.getElementById('judulModulDisplay').innerText = "MODUL " + activeModul.id + ": " + activeModul.judul.toUpperCase();
        document.getElementById('materiPeranDisplay').innerText = "TARGET ROLE: " + peran;
        document.getElementById('videoPlayer').src = activeModul.video_url;
        document.getElementById('sessionModulId').value = activeModul.id;
        document.getElementById('teksSopDisplay').innerText = activeModul.materi ? activeModul.materi : "Ikuti SOP pada video.";

        var htmlKuis = `
          <div class="bg-slate-950 p-4 border border-slate-800 rounded-xl shadow-inner">
            <p class="font-bold text-[10px] uppercase text-amber-500 tracking-wider mb-2">Evaluasi Penguasaan 01</p>
            <label class="block font-medium text-sm text-slate-200 mb-3">${activeModul.soal1}</label>
            <div class="space-y-2">
              <label class="flex items-center text-xs p-2.5 rounded-lg border border-slate-800 bg-slate-900/40 hover:bg-slate-900 cursor-pointer transition"><input type="radio" name="q1" value="${activeModul.opsi1a}" required class="mr-3 h-4 w-4 text-amber-500 focus:ring-0"> ${activeModul.opsi1a}</label>
              <label class="flex items-center text-xs p-2.5 rounded-lg border border-slate-800 bg-slate-900/40 hover:bg-slate-900 cursor-pointer transition"><input type="radio" name="q1" value="${activeModul.opsi1b}" class="mr-3 h-4 w-4 text-amber-500 focus:ring-0"> ${activeModul.opsi1b}</label>
              <label class="flex items-center text-xs p-2.5 rounded-lg border border-slate-800 bg-slate-900/40 hover:bg-slate-900 cursor-pointer transition"><input type="radio" name="q1" value="${activeModul.opsi1c}" class="mr-3 h-4 w-4 text-amber-500 focus:ring-0"> ${activeModul.opsi1c}</label>
            </div>
          </div>
          <div class="bg-slate-950 p-4 border border-slate-800 rounded-xl shadow-inner mt-4">
            <p class="font-bold text-[10px] uppercase text-amber-500 tracking-wider mb-2">Evaluasi Penguasaan 02</p>
            <label class="block font-medium text-sm text-slate-200 mb-3">${activeModul.soal2}</label>
            <div class="space-y-2">
              <label class="flex items-center text-xs p-2.5 rounded-lg border border-slate-800 bg-slate-900/40 hover:bg-slate-900 cursor-pointer transition"><input type="radio" name="q2" value="${activeModul.opsi2a}" required class="mr-3 h-4 w-4 text-amber-500 focus:ring-0"> ${activeModul.opsi2a}</label>
              <label class="flex items-center text-xs p-2.5 rounded-lg border border-slate-800 bg-slate-900/40 hover:bg-slate-900 cursor-pointer transition"><input type="radio" name="q2" value="${activeModul.opsi2b}" class="mr-3 h-4 w-4 text-amber-500 focus:ring-0"> ${activeModul.opsi2b}</label>
              <label class="flex items-center text-xs p-2.5 rounded-lg border border-slate-800 bg-slate-900/40 hover:bg-slate-900 cursor-pointer transition"><input type="radio" name="q2" value="${activeModul.opsi2c}" class="mr-3 h-4 w-4 text-amber-500 focus:ring-0"> ${activeModul.opsi2c}</label>
            </div>
          </div>
          <div class="bg-slate-950 p-4 border border-slate-800 rounded-xl shadow-inner mt-4">
            <p class="font-bold text-[10px] uppercase text-amber-500 tracking-wider mb-2">Evaluasi Penguasaan 02</p>
            <label class="block font-medium text-sm text-slate-200 mb-3">${activeModul.soal3}</label>
            <div class="space-y-2">
              <label class="flex items-center text-xs p-2.5 rounded-lg border border-slate-800 bg-slate-900/40 hover:bg-slate-900 cursor-pointer transition"><input type="radio" name="q2" value="${activeModul.opsi3a}" required class="mr-3 h-4 w-4 text-amber-500 focus:ring-0"> ${activeModul.opsi3a}</label>
              <label class="flex items-center text-xs p-2.5 rounded-lg border border-slate-800 bg-slate-900/40 hover:bg-slate-900 cursor-pointer transition"><input type="radio" name="q2" value="${activeModul.opsi3b}" class="mr-3 h-4 w-4 text-amber-500 focus:ring-0"> ${activeModul.opsi3b}</label>
              <label class="flex items-center text-xs p-2.5 rounded-lg border border-slate-800 bg-slate-900/40 hover:bg-slate-900 cursor-pointer transition"><input type="radio" name="q2" value="${activeModul.opsi3c}" class="mr-3 h-4 w-4 text-amber-500 focus:ring-0"> ${activeModul.opsi3c}</label>
            </div>
          </div>
          <div class="bg-slate-950 p-4 border border-slate-800 rounded-xl shadow-inner mt-4">
            <p class="font-bold text-[10px] uppercase text-amber-500 tracking-wider mb-2">Evaluasi Penguasaan 02</p>
            <label class="block font-medium text-sm text-slate-200 mb-3">${activeModul.soal4}</label>
            <div class="space-y-2">
              <label class="flex items-center text-xs p-2.5 rounded-lg border border-slate-800 bg-slate-900/40 hover:bg-slate-900 cursor-pointer transition"><input type="radio" name="q2" value="${activeModul.opsi4a}" required class="mr-3 h-4 w-4 text-amber-500 focus:ring-0"> ${activeModul.opsi4a}</label>
              <label class="flex items-center text-xs p-2.5 rounded-lg border border-slate-800 bg-slate-900/40 hover:bg-slate-900 cursor-pointer transition"><input type="radio" name="q2" value="${activeModul.opsi4b}" class="mr-3 h-4 w-4 text-amber-500 focus:ring-0"> ${activeModul.opsi4b}</label>
              <label class="flex items-center text-xs p-2.5 rounded-lg border border-slate-800 bg-slate-900/40 hover:bg-slate-900 cursor-pointer transition"><input type="radio" name="q2" value="${activeModul.opsi4c}" class="mr-3 h-4 w-4 text-amber-500 focus:ring-0"> ${activeModul.opsi4c}</label>
            </div>
          </div>
          <div class="bg-slate-950 p-4 border border-slate-800 rounded-xl shadow-inner mt-4">
            <p class="font-bold text-[10px] uppercase text-amber-500 tracking-wider mb-2">Evaluasi Penguasaan 02</p>
            <label class="block font-medium text-sm text-slate-200 mb-3">${activeModul.soal5}</label>
            <div class="space-y-2">
              <label class="flex items-center text-xs p-2.5 rounded-lg border border-slate-800 bg-slate-900/40 hover:bg-slate-900 cursor-pointer transition"><input type="radio" name="q2" value="${activeModul.opsi5a}" required class="mr-3 h-4 w-4 text-amber-500 focus:ring-0"> ${activeModul.opsi5a}</label>
              <label class="flex items-center text-xs p-2.5 rounded-lg border border-slate-800 bg-slate-900/40 hover:bg-slate-900 cursor-pointer transition"><input type="radio" name="q2" value="${activeModul.opsi5b}" class="mr-3 h-4 w-4 text-amber-500 focus:ring-0"> ${activeModul.opsi5b}</label>
              <label class="flex items-center text-xs p-2.5 rounded-lg border border-slate-800 bg-slate-900/40 hover:bg-slate-900 cursor-pointer transition"><input type="radio" name="q2" value="${activeModul.opsi5c}" class="mr-3 h-4 w-4 text-amber-500 focus:ring-0"> ${activeModul.opsi5c}</label>
            </div>
          </div>
        `;
        document.getElementById('dynamicKuisArea').innerHTML = htmlKuis;
        document.getElementById('btnKuis').classList.remove('hidden');
        document.getElementById('notifKuis').classList.add('hidden');
      }

      // 3. KIRIM JAWABAN KE BACKEND SERVERLESS UNTUK EVALUASI DAN PENYIMPANAN
      function executeKuisSubmit(event) {
        event.preventDefault();
        var btn = document.getElementById('btnKuis');
        var notif = document.getElementById('notifKuis');
        btn.disabled = true;
        btn.innerText = "MENGANALISIS DATA KELULUSAN...";

        var payload = {
          pin: document.getElementById('sessionPin').value,
          nama: document.getElementById('sessionNama').value,
          modulId: document.getElementById('sessionModulId').value,
          jawaban1: document.querySelector('input[name="q1"]:checked').value,
          jawaban2: document.querySelector('input[name="q2"]:checked').value,
          jawaban3: document.querySelector('input[name="q3"]:checked').value,
          jawaban4: document.querySelector('input[name="q4"]:checked').value,
          jawaban5: document.querySelector('input[name="q5"]:checked').value
        };

        fetch('/api/kuis', {
          method: 'POST',
          body: JSON.stringify(payload)
        })
        .then(res => res.json())
        .then(respon => {
          if (!respon.status) throw new Error(respon.pesan);
          
          notif.classList.remove('hidden');
          if (respon.skor === 100) {
            notif.className = "mt-4 p-4 bg-emerald-950 text-emerald-400 border border-emerald-500/30 rounded-xl text-xs font-semibold text-center";
            notif.innerText = "SKOR 100. Kompetensi Peran Terpenuhi! Riwayat Anda terkunci di server belakang.";
            btn.classList.add('hidden');
          } else {
            notif.className = "mt-4 p-4 bg-red-950 text-red-400 border border-red-500/30 rounded-xl text-xs font-semibold text-center";
            notif.innerText = "Skor Anda " + respon.skor + ". Wajib mendapatkan nilai sempurna (100) untuk lolos!";
            btn.disabled = false;
            btn.innerText = "KIRIM EVALUASI KOMPETENSI";
          }
        })
        .catch(err => {
          notif.innerText = "ERROR EVALUASI: " + err.message;
          notif.className = "mt-4 p-4 bg-red-950 text-red-400 border border-red-500/30 rounded-xl text-xs font-semibold text-center shadow-inner";
          notif.classList.remove('hidden');
          btn.disabled = false;
          btn.innerText = "KIRIM EVALUASI KOMPETENSI";
        });
      }

      function kembaliKeDashboard() {
        activeModul = null;
        document.getElementById('materiView').classList.add('hidden');
        document.getElementById('videoPlayer').src = "";
        document.getElementById('formKuis').reset();
        document.getElementById('dashboardView').classList.remove('hidden');
      }

      function executeLogout() {
        location.reload();
      }
    </script>
  </body>
</html>
